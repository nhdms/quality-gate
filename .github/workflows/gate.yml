name: gate

# Portable quality gate. Consumed by any repo via:
#
#   jobs:
#     gate:
#       uses: nhdms/quality-gate/.github/workflows/gate.yml@main
#       with:
#         config: ./gate.config.json   # optional, this is the default
#
# The `workflow_call` interface below is STABLE — downstream repos pin it.
# Per-project differences belong in gate.config.json (validated by
# gate.schema.json), never hardcoded here.
on:
  workflow_call:
    inputs:
      config:
        description: Path to the caller's gate.config.json.
        type: string
        default: ./gate.config.json
      stack:
        description: Stack override (auto|ts|go|rust). 'auto' detects from manifests.
        type: string
        default: auto
      visual_base_url:
        description: Base URL the visual lane captures against (e.g. a per-PR preview URL). Falls back to visual.baseURL in the config.
        type: string
        default: ''
    outputs:
      stack:
        description: The stack the gate ran against (detected or overridden).
        value: ${{ jobs.detect.outputs.stack }}

jobs:
  detect:
    name: detect + validate
    runs-on: [self-hosted, quality-gate]
    outputs:
      stack: ${{ steps.detect.outputs.stack }}
      tooldir: ${{ steps.tool.outputs.dir }}
      visual: ${{ steps.visual.outputs.enabled }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      # The gate's tooling (schema + cli) lives in THIS repo. When the gate runs
      # on its own repo (dogfood), the caller checkout already contains it; an
      # external consumer does not, so we fetch it into a side directory.
      - name: Resolve gate tooling
        id: tool
        run: |
          if [ -f ./cli/validate-config.js ] && [ -f ./gate.schema.json ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          else
            echo "dir=.quality-gate" >> "$GITHUB_OUTPUT"
          fi

      # TODO(#adoption): pin `ref` to the v1 tag once the interface is frozen.
      - name: Checkout quality-gate tooling
        if: steps.tool.outputs.dir == '.quality-gate'
        uses: actions/checkout@v4
        with:
          repository: nhdms/quality-gate
          ref: main
          path: .quality-gate

      - name: Validate gate.config.json against schema
        run: node ${{ steps.tool.outputs.dir }}/cli/validate-config.js "${{ inputs.config }}" ${{ steps.tool.outputs.dir }}/gate.schema.json

      - name: Detect stack
        id: detect
        run: |
          set -euo pipefail
          if [ "${{ inputs.stack }}" = "auto" ]; then
            stack="$(node ${{ steps.tool.outputs.dir }}/cli/detect-stack.js .)"
          else
            stack="${{ inputs.stack }}"
          fi
          echo "stack=$stack" >> "$GITHUB_OUTPUT"
          echo "quality-gate: running stack '$stack'"

      - name: Detect visual lane (visual.routes configured)
        id: visual
        run: |
          set -euo pipefail
          routes="$(node ${{ steps.tool.outputs.dir }}/cli/config-get.js "${{ inputs.config }}" visual.routes '[]')"
          if [ "$routes" != "[]" ] && [ -n "$routes" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "quality-gate: visual lane ENABLED"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "quality-gate: visual lane skipped (no visual.routes)"
          fi

  # Stack-agnostic mechanics that run on the PR DIFF for every stack:
  #   - no-junk-diff: refuse banned paths / oversized binaries
  #   - secret scan : any secret in an added line fails the gate
  diff:
    name: diff mechanics (no-junk + secrets)
    needs: detect
    runs-on: [self-hosted, quality-gate]
    steps:
      - name: Checkout caller repo (full history for diffing)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve gate tooling
        id: tool
        run: |
          if [ -f ./cli/check-no-junk.js ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          else
            echo "dir=.quality-gate" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout quality-gate tooling
        if: steps.tool.outputs.dir == '.quality-gate'
        uses: actions/checkout@v4
        with:
          repository: nhdms/quality-gate
          ref: main
          path: .quality-gate

      - name: Compute diff range
        id: range
        run: |
          set -euo pipefail
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch --no-tags --depth=200 origin "$GITHUB_BASE_REF" || true
            base="origin/$GITHUB_BASE_REF"
          else
            base="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "quality-gate: diffing against '$base'"

      - name: Collect changed files + diff
        run: |
          set -euo pipefail
          base="${{ steps.range.outputs.base }}"
          git diff --name-only --diff-filter=ACMR "$base...HEAD" > changed-files.txt || true
          git diff --unified=0 "$base...HEAD" > pr.gate.diff || true
          echo "quality-gate: $(wc -l < changed-files.txt) changed files"

      - name: No-junk-diff check
        run: node ${{ steps.tool.outputs.dir }}/cli/check-no-junk.js changed-files.txt "${{ inputs.config }}"

      - name: Secret scan (added lines)
        run: node ${{ steps.tool.outputs.dir }}/cli/check-secrets.js pr.gate.diff "${{ inputs.config }}"

  ts:
    name: ts lane
    needs: detect
    if: needs.detect.outputs.stack == 'ts'
    uses: ./.github/workflows/_lane-ts.yml
    with:
      config: ${{ inputs.config }}

  go:
    name: go lane
    needs: detect
    if: needs.detect.outputs.stack == 'go'
    uses: ./.github/workflows/_lane-go.yml
    with:
      config: ${{ inputs.config }}

  rust:
    name: rust lane
    needs: detect
    if: needs.detect.outputs.stack == 'rust'
    uses: ./.github/workflows/_lane-rust.yml
    with:
      config: ${{ inputs.config }}

  # Stack-agnostic visual/UI oracle: only runs when visual.routes is configured.
  visual:
    name: visual lane
    needs: detect
    if: needs.detect.outputs.visual == 'true'
    uses: ./.github/workflows/_lane-visual.yml
    with:
      config: ${{ inputs.config }}
      base_url: ${{ inputs.visual_base_url }}

  gate:
    name: gate result
    needs: [detect, diff, ts, go, rust, visual]
    if: always()
    runs-on: [self-hosted, quality-gate]
    steps:
      - name: Aggregate lane results
        run: |
          set -euo pipefail
          echo "detect=${{ needs.detect.result }} diff=${{ needs.diff.result }} ts=${{ needs.ts.result }} go=${{ needs.go.result }} rust=${{ needs.rust.result }} visual=${{ needs.visual.result }}"
          for r in "${{ needs.detect.result }}" "${{ needs.diff.result }}" "${{ needs.ts.result }}" "${{ needs.go.result }}" "${{ needs.rust.result }}" "${{ needs.visual.result }}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "quality-gate: FAILED"
              exit 1
            fi
          done
          echo "quality-gate: PASSED for stack '${{ needs.detect.outputs.stack }}'"

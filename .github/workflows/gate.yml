name: gate

# Portable quality gate. Consumed by any repo via:
#
#   jobs:
#     gate:
#       uses: nhdms/quality-gate/.github/workflows/gate.yml@main
#       with:
#         config: ./gate.config.json   # optional, this is the default
#
# The `workflow_call` interface below is STABLE — downstream repos pin it.
# Per-project differences belong in gate.config.json (validated by
# gate.schema.json), never hardcoded here.
on:
  workflow_call:
    inputs:
      config:
        description: Path to the caller's gate.config.json.
        type: string
        default: ./gate.config.json
      stack:
        description: Stack override (auto|ts|go|rust). 'auto' detects from manifests.
        type: string
        default: auto
    outputs:
      stack:
        description: The stack the gate ran against (detected or overridden).
        value: ${{ jobs.detect.outputs.stack }}

jobs:
  detect:
    name: detect + validate
    runs-on: [self-hosted, quality-gate]
    outputs:
      stack: ${{ steps.detect.outputs.stack }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      # The gate's own tooling (schema + cli) lives in this repo, not the
      # caller's checkout, so it is fetched into a side directory.
      # TODO(#adoption): pin `ref` to the v1 tag once the interface is frozen.
      - name: Checkout quality-gate tooling
        uses: actions/checkout@v4
        with:
          repository: nhdms/quality-gate
          ref: main
          path: .quality-gate

      - name: Validate gate.config.json against schema
        run: node .quality-gate/cli/validate-config.js "${{ inputs.config }}" .quality-gate/gate.schema.json

      - name: Detect stack
        id: detect
        run: |
          set -euo pipefail
          if [ "${{ inputs.stack }}" = "auto" ]; then
            stack="$(node .quality-gate/cli/detect-stack.js .)"
          else
            stack="${{ inputs.stack }}"
          fi
          echo "stack=$stack" >> "$GITHUB_OUTPUT"
          echo "quality-gate: running stack '$stack'"

  ts:
    name: ts lane
    needs: detect
    if: needs.detect.outputs.stack == 'ts'
    uses: ./.github/workflows/_lanes/ts.yml
    with:
      config: ${{ inputs.config }}

  go:
    name: go lane
    needs: detect
    if: needs.detect.outputs.stack == 'go'
    uses: ./.github/workflows/_lanes/go.yml
    with:
      config: ${{ inputs.config }}

  rust:
    name: rust lane
    needs: detect
    if: needs.detect.outputs.stack == 'rust'
    uses: ./.github/workflows/_lanes/rust.yml
    with:
      config: ${{ inputs.config }}

  gate:
    name: gate result
    needs: [detect, ts, go, rust]
    if: always()
    runs-on: [self-hosted, quality-gate]
    steps:
      - name: Aggregate lane results
        run: |
          set -euo pipefail
          echo "detect=${{ needs.detect.result }} ts=${{ needs.ts.result }} go=${{ needs.go.result }} rust=${{ needs.rust.result }}"
          for r in "${{ needs.detect.result }}" "${{ needs.ts.result }}" "${{ needs.go.result }}" "${{ needs.rust.result }}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "quality-gate: FAILED"
              exit 1
            fi
          done
          echo "quality-gate: PASSED for stack '${{ needs.detect.outputs.stack }}'"

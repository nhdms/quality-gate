name: ts-lane

# TypeScript/JavaScript lane.
#   T0 mechanics:
#     - frozen lockfile install (drift fails)
#     - anti-fake-done lint of package scripts (no --passWithNoTests etc.)
#     - run tests WITHOUT --passWithNoTests; enforce thresholds.minTests
#     - changed-line coverage gate
#     - e2e retry surfacing (retry-as-failure-signal)
#   T1 anti-fake-done static ruleset (blocking):
#     - rules/ via ast-grep, run by cli/run-rules.js — catches
#       optimistic-success-signaling ("fake-done").
#   T3 wired-not-mock behavioral smoke (blocking):
#     - wired/ assertions run by cli/run-wired.js — proves a feature actually
#       does the thing end-to-end (email really enqueued, overlap really
#       rejected), observed black-box from capture artifacts.
on:
  workflow_call:
    inputs:
      config:
        description: Path to the caller's gate.config.json.
        type: string
        default: ./gate.config.json

jobs:
  ts:
    name: ts checks
    runs-on: [self-hosted, quality-gate]
    env:
      CONFIG: ${{ inputs.config }}
    steps:
      - name: Checkout caller repo (full history for diffing)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pin Node so the caller's tests/build run on a supported version instead
      # of the self-hosted runner's system Node (which may be old — e.g. Node 18,
      # where global `crypto` is absent, silently breaking suites that pass on
      # Node 20+). Reads an optional `node` field from gate.config.json; default
      # 22. (#23)
      - name: Resolve Node version
        id: node
        run: |
          V="$(node -e "try{process.stdout.write(String(require(require('path').resolve(process.env.CONFIG)).node||''))}catch(e){}" 2>/dev/null || true)"
          echo "version=${V:-22}" >> "$GITHUB_OUTPUT"
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}

      # The gate's tooling (cli/ + rules/) lives in THIS repo. On the gate's own
      # repo (dogfood) the caller checkout already contains it. An external
      # consumer does not, so we fetch it — into $RUNNER_TEMP, OUTSIDE the
      # caller's working dir, so the caller's test runner (vitest/jest whole-tree
      # globbing) never sweeps the gate's own fixture `*.test.*` files, and the
      # T1 scan of `.` never matches the gate's own rule fixtures. (#24)
      - name: Resolve gate tooling
        id: tool
        run: |
          if [ -f ./cli/check-min-tests.js ] && [ -f ./cli/run-rules.js ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
            echo "external=false" >> "$GITHUB_OUTPUT"
          else
            echo "dir=$RUNNER_TEMP/quality-gate" >> "$GITHUB_OUTPUT"
            echo "external=true" >> "$GITHUB_OUTPUT"
          fi

      # Pinned to the v1 tag: external consumers pin gate.yml@v1, so the tooling
      # they fetch must match that frozen interface (see ADOPTION.md). checkout
      # cannot target a path outside the workspace, so we land it in the
      # workspace then move it to $RUNNER_TEMP before any caller command runs.
      - name: Checkout quality-gate tooling
        if: steps.tool.outputs.external == 'true'
        uses: actions/checkout@v4
        with:
          repository: nhdms/quality-gate
          ref: v1
          path: .qg-tooling-src
      - name: Move tooling out of the caller's test-scan path
        if: steps.tool.outputs.external == 'true'
        run: |
          rm -rf "$RUNNER_TEMP/quality-gate"
          mv .qg-tooling-src "$RUNNER_TEMP/quality-gate"

      - name: Anti-fake-done lint (banned test flags)
        run: node ${{ steps.tool.outputs.dir }}/cli/lint-test-cmd.js ./package.json

      - name: Frozen-lockfile install
        run: |
          set -eo pipefail
          TOOL="${{ steps.tool.outputs.dir }}"
          FROZEN="$(node "$TOOL/cli/config-get.js" "$CONFIG" frozenLockfile true)"
          node "$TOOL/cli/check-frozen-lockfile.js" . "$FROZEN"

      # Optional pre-test build. Monorepos whose tests import a built workspace
      # dep (e.g. a subpath resolving to another package's dist/) must build
      # first, or those suites fail with ERR_MODULE_NOT_FOUND on a tree that is
      # green in the caller's own CI. Skipped when `buildCommand` is unset. (#26)
      - name: Build (optional, before tests)
        run: |
          set -eo pipefail
          TOOL="${{ steps.tool.outputs.dir }}"
          BUILD="$(node "$TOOL/cli/config-get.js" "$CONFIG" buildCommand '')"
          if [ -n "$BUILD" ]; then
            echo "quality-gate: running caller build before tests: $BUILD"
            eval "$BUILD"
          else
            echo "quality-gate: no buildCommand configured — skipping pre-test build."
          fi

      - name: Run tests + enforce minTests
        run: |
          set -eo pipefail
          TOOL="${{ steps.tool.outputs.dir }}"
          MIN="$(node "$TOOL/cli/config-get.js" "$CONFIG" thresholds.minTests 1)"
          test_exit=0
          npm test > test-output.txt 2>&1 || test_exit=$?
          cat test-output.txt
          if [ "$test_exit" -ne 0 ]; then
            echo "::error::quality-gate: caller test command failed (exit $test_exit)"
            exit "$test_exit"
          fi
          node "$TOOL/cli/check-min-tests.js" test-output.txt "$MIN"

      - name: Changed-line coverage gate
        run: |
          set -eo pipefail
          TOOL="${{ steps.tool.outputs.dir }}"
          THR="$(node "$TOOL/cli/config-get.js" "$CONFIG" thresholds.changedLineCoverage 0)"

          # Locate an lcov report, or best-effort generate one for node --test repos.
          LCOV=""
          if [ -f coverage/lcov.info ]; then LCOV=coverage/lcov.info; fi
          if [ -z "$LCOV" ] && grep -q 'node --test' package.json; then
            mkdir -p coverage
            node --test --experimental-test-coverage \
              --test-reporter=lcov --test-reporter-destination=coverage/lcov.info \
              > /dev/null 2>&1 || true
            if [ -f coverage/lcov.info ]; then LCOV=coverage/lcov.info; fi
          fi
          if [ -z "$LCOV" ]; then
            echo "::warning::quality-gate: no lcov report available — changed-line coverage not enforced on this run"
            exit 0
          fi

          # Changed lines vs the PR base (or previous commit on push).
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch --no-tags --depth=200 origin "$GITHUB_BASE_REF" || true
            BASE="origin/$GITHUB_BASE_REF"
          else
            BASE="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
          fi
          git diff --unified=0 "$BASE...HEAD" -- '*.js' '*.jsx' '*.ts' '*.tsx' > cov.gate.diff || true
          node "$TOOL/cli/check-changed-coverage.js" "$LCOV" cov.gate.diff "$THR" "$CONFIG"

      - name: E2E retry surfacing
        run: |
          set -eo pipefail
          TOOL="${{ steps.tool.outputs.dir }}"
          REPORT="$(node "$TOOL/cli/config-get.js" "$CONFIG" e2e.report "")"
          MAXR="$(node "$TOOL/cli/config-get.js" "$CONFIG" thresholds.maxRetries 0)"
          if [ -z "$REPORT" ]; then
            echo "quality-gate: no e2e.report configured — skipping retry check."
            exit 0
          fi
          node "$TOOL/cli/check-retries.js" "$REPORT" "$MAXR"

      # ast-grep is a pinned devDependency of the gate tooling. Install it into
      # the tooling dir's local node_modules (run-rules.js resolves the local
      # .bin/ast-grep) rather than `-g`, which fails with EACCES on locked-down
      # self-hosted runners.
      - name: Install T1 rules engine (ast-grep)
        run: |
          set -eo pipefail
          cd "${{ steps.tool.outputs.dir }}"
          npm ci

      - name: Anti-fake-done ruleset (T1, blocking)
        run: node ${{ steps.tool.outputs.dir }}/cli/run-rules.js . --config "$CONFIG" --tool-dir ${{ steps.tool.outputs.dir }}

      # T3 wired-not-mock behavioral smoke. Only runs when the caller declares
      # `wired[]`. The optional `wiredSetup.command` is the caller's glue: it
      # exercises the real feature (against its own DB/fixtures) and writes a
      # capture artifact per assertion into `wiredSetup.captureDir`. The harness
      # then asserts behavior black-box. Fail-closed: a declared assertion with
      # no capture fails the gate.
      #
      # Provenance: captures MUST be produced in-run. We wipe the capture dir
      # BEFORE running the glue so a committed or stale-from-a-prior-run capture
      # cannot fake a green — otherwise "looks done but faked" just relocates
      # from the code to a hand-crafted wired-captures/<id>.json. If no glue is
      # configured, the dir stays empty and every declared assertion fail-closes.
      - name: Wired-not-mock behavioral smoke (T3, blocking)
        run: |
          set -eo pipefail
          TOOL="${{ steps.tool.outputs.dir }}"
          WIRED="$(node "$TOOL/cli/config-get.js" "$CONFIG" wired '[]')"
          if [ "$WIRED" = "[]" ] || [ -z "$WIRED" ]; then
            echo "quality-gate: no wired[] assertions declared — skipping T3."
            exit 0
          fi
          CAP="$(node "$TOOL/cli/config-get.js" "$CONFIG" wiredSetup.captureDir 'wired-captures')"
          # Refuse an unsafe capture dir before we rm -rf it.
          case "$CAP" in
            ""|"."|".."|"/"|/*|*..*)
              echo "::error::quality-gate: wiredSetup.captureDir '$CAP' is unsafe — use a relative path inside the repo."
              exit 2
              ;;
          esac
          rm -rf "$CAP" && mkdir -p "$CAP"
          CMD="$(node "$TOOL/cli/config-get.js" "$CONFIG" wiredSetup.command '')"
          if [ -n "$CMD" ]; then
            echo "quality-gate: producing wired captures in '$CAP/' via: $CMD"
            eval "$CMD"
          else
            echo "::warning::quality-gate: no wiredSetup.command — captures must be produced in-run; declared assertions fail-closed if absent."
          fi
          node "$TOOL/cli/run-wired.js" --config "$CONFIG" --tool-dir "$TOOL" --capture-dir "$CAP"

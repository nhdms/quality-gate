name: ts-lane

# Per-stack lane for TypeScript/JavaScript repos.
# STUB ONLY for #1 — real checks (T0 changed-line coverage, T1 ruleset,
# T2 visual, T4 wired/CLI) land in later issues.
on:
  workflow_call:
    inputs:
      config:
        description: Path to the caller's gate.config.json.
        type: string
        default: ./gate.config.json

jobs:
  ts:
    name: ts checks (stub)
    runs-on: [self-hosted, quality-gate]
    steps:
      - name: Stub
        run: |
          echo "quality-gate ts lane stub — real checks land in later issues (config=${{ inputs.config }})."

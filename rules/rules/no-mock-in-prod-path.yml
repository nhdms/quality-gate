# no-mock-in-prod-path
#
# Mock / hardcoded / placeholder data, or setTimeout/setInterval fakes standing
# in for real async work, on a NON-TEST production code path (pages,
# components, server). The audit found an onboarding wizard that was "100%
# mock": MOCK_ data rendered as real, plus a `setTimeout` faking the save call.
#
# Two high-signal shapes are flagged:
#   1. a `const/let/var` whose NAME marks it as mock/fake/placeholder data, and
#   2. a `new Promise(...)` whose timer callback FAKES A RESULT — it resolves
#      with fabricated data, flips a done/success flag, or calls a setter. That
#      is the "fake round-trip" standing in for real IO.
#
# NB: a plain delay/backoff — `new Promise(res => setTimeout(res, ms))` — only
# advances time (no callback body doing work) and is intentionally NOT matched.
# Genuine retry/sleep/jitter helpers are legitimate production code; flagging
# them was a false positive (see issue #19).
#
# Test, spec, story and __mocks__ files are excluded (see `ignores`) — mock
# data there is legitimate. Generic TODO comments are intentionally NOT matched
# to keep the rule precise.
id: no-mock-in-prod-path
language: tsx
severity: error
message: >-
  Mock/placeholder data or a fake timer on a production code path. Wire this to
  real data/IO before shipping, or move it to a test file.
note: See rules/README.md#no-mock-in-prod-path.
ignores:
  - "**/*.test.*"
  - "**/*.spec.*"
  - "**/__tests__/**"
  - "**/__mocks__/**"
  - "**/*.stories.*"
  - "**/*.story.*"
  - "**/test/**"
  - "**/tests/**"
  - "**/node_modules/**"
  - "**/fixtures/**"
rule:
  any:
    # 1. mock/fake/placeholder-named data declarations (NAME filtered below)
    - pattern: const $NAME = $INIT
    - pattern: let $NAME = $INIT
    - pattern: var $NAME = $INIT
    # 2. a Promise whose timer callback FAKES A RESULT — a simulated round-trip.
    #    We require an arrow/function callback *inside* a setTimeout/setInterval
    #    that does more than advance time: it resolves with a value ($R($ARG)),
    #    flips a flag or calls a setter ($LHS = $RHS / set*()). A plain delay —
    #    setTimeout(res, ms), with no callback body doing work — has no such
    #    callback and is therefore NOT matched.
    - all:
        - pattern: new Promise($$$PROMISE_ARGS)
        - has:
            stopBy: end
            all:
              - any:
                  - kind: arrow_function
                  - kind: function_expression
              - inside:
                  stopBy: end
                  any:
                    - pattern: setTimeout($$$T)
                    - pattern: setInterval($$$T)
              - has:
                  stopBy: end
                  any:
                    # resolves/returns a fabricated value: () => res(DATA)
                    - pattern: $RESOLVE($ARG)
                    # flips a flag / assigns a fabricated result: done = true
                    - pattern: $LHS = $RHS
constraints:
  # Only the declaration branches bind NAME; this filters them to data whose
  # very name advertises it as mock/fake/placeholder.
  #
  # NB: 'sample'/'SAMPLE' is deliberately NOT included — it false-positives on
  # ordinary production identifiers (sampleRate, sampleSize, sampleCount in
  # audio/analytics code). mock/fake/stub/dummy/placeholder + the MOCK_/FAKE_
  # SCREAMING prefixes still cover genuine mock data.
  NAME:
    regex: "^(MOCK|FAKE|DUMMY|STUB|PLACEHOLDER|HARDCODED)(_|$)|^(mock|fake|dummy|stub|placeholder|hardcoded)[A-Z0-9]|^(Mock|Fake|Dummy|Stub|Placeholder|Hardcoded)[A-Z0-9a-z]"
